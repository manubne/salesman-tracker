name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack app from base64 zip
        run: |
          base64 -d appcode.b64 > app.zip
          rm -rf app
          unzip -o app.zip
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Create platform folders
        working-directory: app
        run: flutter create --platforms=android,web .
      - name: Get packages
        working-directory: app
        run: flutter pub get
      - name: Build release APK
        working-directory: app
        run: flutter build apk --release
      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK
          files: app/build/app/outputs/flutter-apk/app-release.apk
      - name: Build web
        working-directory: app
        run: flutter build web --release --base-href /salesman-tracker/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
