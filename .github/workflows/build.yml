name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack app from base64
        run: |
          base64 -d appcode.b64 > app.zip
          rm -rf app
          unzip -o app.zip
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Create platform folders
        working-directory: app
        run: flutter create --platforms=android,web .
      - name: Add Android permissions
        working-directory: app
        run: |
          M=android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' $M
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>' $M
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>' $M
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA"/>' $M
          sed -i '/<manifest/a\    <queries><intent><action android:name="android.intent.action.VIEW"/><data android:scheme="https"/></intent></queries>' $M
          sed -i '/<application/a\        <meta-data android:name="com.google.android.geo.API_KEY" android:value="AIzaSyBNT4QhzhjkPlfkp3KjuwiUrUS2X8Nl-78"/>' $M
          sed -i 's#</head>#  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBNT4QhzhjkPlfkp3KjuwiUrUS2X8Nl-78"></script>\n</head>#' web/index.html
          echo "--- manifest ---"; head -14 $M
      - name: Get packages
        working-directory: app
        run: flutter pub get
      - name: Build release APK
        working-directory: app
        run: flutter build apk --release
      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK
          files: app/build/app/outputs/flutter-apk/app-release.apk
      - name: Build web (app + admin dashboard)
        working-directory: app
        run: |
          flutter build web --release --base-href /salesman-tracker/
          cp ../admin.html build/web/admin.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
